<style>
/* BODY */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f8f8f8;
}

/* NAVBAR */
nav {
    background: #c40000;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* Contact Info */
.contact-info {
    text-align: center;
    line-height: 1.2;
}

.contact-info a {
    color: white;
    text-decoration: none;
    font-size: 14px;
    margin: 0 5px;
}

.contact-info a:hover {
    opacity: 0.8;
}

/* Social icons */
.social-icons {
    margin-top: 5px;
}

.social-icons a {
    display: inline-block;
}

.social-icons img {
    height: 20px;
    margin: 0 5px;
    vertical-align: middle;
    cursor: pointer;
    transition: transform 0.3s;
}

.social-icons img:hover {
    transform: scale(1.2);
}

/* LOGO */
.logo img {
    height: 50px;
    display: block;
    margin: 0 auto;
}

/* MENU ITEMS */
.menu-items a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-weight: bold;
}

.menu-items a:hover {
    opacity: 0.8;
}

/* HAMBURGER BUTTON */
.hamburger {
    display: none;
    font-size: 28px;
    color: white;
    cursor: pointer;
}

/* CONTACT FORM */
.contact-container {
    max-width: 600px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.contact-container h2 {
    color: #c40000;
    text-align: center;
}

.contact-container label {
    display: block;
    margin: 10px 0 5px 0;
    font-weight: bold;
}

.contact-container input,
.contact-container textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.contact-container button {
    padding: 12px 20px;
    background: #c40000;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.contact-container button:hover {
    background: #a00000;
}
footer {
    background: #900000;
    color: white;
    text-align: center;
    padding: 18px;
    margin-top: 50px;
}

/* RESPONSIVE */
@media screen and (max-width: 768px) {
    .menu-items {
        display: none;
        flex-direction: column;
        background: #c40000;
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
        padding: 10px;
        border-radius: 5px;
    }

    .menu-items.show {
        display: flex;
    }

    .hamburger {
        display: block;
    }

    .menu-items a {
        margin: 10px 0;
    }

    nav {
        flex-wrap: wrap;
    }
}
</style>
</head>
